# ==========================================
# CONFIGURAÇŐES DO SERVIDOR (SPRING BOOT)
# ==========================================
server.port=8080

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

server.error.include-stacktrace=never

# ==========================================
# CONFIGURAÇŐES DO BANCO DE DADOS (MYSQL)
# ==========================================

spring.datasource.url=jdbc:mysql://localhost:3306/Api_GE?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root

spring.datasource.password=

# ==========================================
# CONFIGURAÇŐES DO JPA / HIBERNATE
# ==========================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect