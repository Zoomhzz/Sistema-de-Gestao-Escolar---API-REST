# ==========================================
# CONFIGURA��ES DO SERVIDOR (SPRING BOOT)
# ==========================================
server.port=8080

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

server.error.include-stacktrace=never

# ==========================================
# CONFIGURA��ES DO BANCO DE DADOS (MYSQL)
# ==========================================

spring.datasource.url=jdbc:mysql://localhost:3306/Api_GE?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root

spring.datasource.password=

# ==========================================
# CONFIGURA��ES DO JPA / HIBERNATE
# ==========================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect